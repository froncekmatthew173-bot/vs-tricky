name: Desktop Builds

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install macOS dependencies
        if: matrix.target == 'mac'
        run: brew install vlc

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-multilib gcc-multilib libc6-dev-i386 libvlc-dev libvlccore-dev

      - name: Install Haxelibs
        shell: bash
        run: |
          haxelib install lime 7.9.0
          haxelib install openfl 9.0.2
          haxelib install hxcpp
          haxelib install flixel 4.11.0
          haxelib install flixel-addons 2.8.0
          haxelib install flixel-ui 2.3.3
          haxelib install hscript 2.4.0
          haxelib install actuate
          haxelib install newgrounds 1.1.5
          haxelib install polymod 1.5.2
          haxelib git extension-webm https://github.com/KadeDev/extension-webm

      - name: Rebuild extension-webm
        run: haxelib run lime rebuild extension-webm ${{ matrix.target }}

      - name: Build
        run: haxelib run lime build ${{ matrix.target }} -release

      - name: Package build
        shell: pwsh
        run: |
          $binDirs = Get-ChildItem -Path export/release -Recurse -Directory -Filter bin
          if ($binDirs.Count -eq 0) {
            throw "No release bin directory found."
          }

          $staging = "release/trickster-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          foreach ($bin in $binDirs) {
            Copy-Item -Path (Join-Path $bin.FullName "*") -Destination $staging -Recurse -Force
          }

          Compress-Archive -Path "$staging/*" -DestinationPath "release/trickster-${{ matrix.target }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trickster-${{ matrix.target }}
          path: release/trickster-${{ matrix.target }}.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/trickster-${{ matrix.target }}.zip
